stages:
  - test
  - build

variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

.test_template: &test_template
  image: node:${NODE_VERSION}-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline

test:
  <<: *test_template
  stage: test
  script:
    - npm run test:run
    - npm run lint
  artifacts:
    reports:
      junit: test-results/junit.xml
    when: always

build:
  <<: *test_template
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - merge_requests
