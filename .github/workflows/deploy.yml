name: StockOps MSA Production CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: seoul-cluster
  ECR_REGISTRY: 448768137813.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::448768137813:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      # ── 프론트엔드 빌드 & S3 배포 ──────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & Deploy client-web → S3
        run: |
          cd stockops-client-web
          npm ci
          npm run build
          aws s3 sync dist/ s3://siseon-frontend-client --delete

      - name: Build & Deploy admin-web → S3
        run: |
          cd stockops-admin-web
          npm ci
          npm run build
          aws s3 sync dist/ s3://siseon-frontend-admin --delete

      # ── 백엔드 이미지 빌드 & ECR 푸시 ─────────────────────────────────

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push api-server
        run: |
          docker build -t $ECR_REGISTRY/stockops-api:latest stockops-api-server/
          docker push $ECR_REGISTRY/stockops-api:latest

      - name: Build & Push ai-module
        run: |
          docker build -t $ECR_REGISTRY/stockops-ai:latest stockops-ai-module/
          docker push $ECR_REGISTRY/stockops-ai:latest

      # ── EKS 롤링 재시작 ────────────────────────────────────────────────

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/stockops-api -n stockops
          kubectl rollout restart deployment/stockops-ai -n stockops
      
      - name: Rollout restart (Ohio)
        run: |
          aws eks update-kubeconfig --region us-east-2 --name ohio-cluster
          kubectl rollout restart deployment/stockops-api -n stockops
          kubectl rollout restart deployment/stockops-ai -n stockops

      # ── CloudFront 캐시 무효화 ─────────────────────────────────────────
      # CloudFront 배포 ID를 도메인 alias로 동적 조회 (하드코딩 없이)

      - name: Invalidate CloudFront cache
        run: |
          CLIENT_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='siseon.live']].Id" \
            --output text)
          ADMIN_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='app.siseon.live']].Id" \
            --output text)

          aws cloudfront create-invalidation \
            --distribution-id $CLIENT_DIST_ID --paths "/*"
          aws cloudfront create-invalidation \
            --distribution-id $ADMIN_DIST_ID --paths "/*"
