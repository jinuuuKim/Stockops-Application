name: StockOps MSA Production CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: seoul-cluster
  ECR_SEOUL: 448768137813.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_OHIO: 448768137813.dkr.ecr.us-east-2.amazonaws.com
  # 오하이오 재활성화 시 "true" → 양 리전 push + 오하이오 rollout 자동 활성화
  PUSH_OHIO: "false"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::448768137813:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      # ── 프론트엔드 빌드 & S3 배포 ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & Deploy client-web → S3
        run: |
          cd stockops-client-web
          npm ci
          npm run build
          aws s3 sync dist/ s3://siseon-frontend-client --delete

      - name: Build & Deploy admin-web → S3
        run: |
          cd stockops-admin-web
          npm ci
          npm run build
          aws s3 sync dist/ s3://siseon-frontend-admin --delete

      # ── ECR 로그인 (서울 + 오하이오) ──────────────────────────────────
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 \
            | docker login --username AWS --password-stdin $ECR_SEOUL
          if [ "$PUSH_OHIO" = "true" ]; then
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin $ECR_OHIO
          fi

      # ── 백엔드 빌드 1회 → 양 리전 직접 push (:sha) ───────────
      - name: Build & Push api-server
        run: |
          REGISTRIES="$ECR_SEOUL"
          [ "$PUSH_OHIO" = "true" ] && REGISTRIES="$REGISTRIES $ECR_OHIO"
          docker build -t stockops-api:${{ github.sha }} stockops-api-server/
          for reg in $REGISTRIES; do
            docker tag stockops-api:${{ github.sha }} $reg/stockops-api:${{ github.sha }}
            docker push $reg/stockops-api:${{ github.sha }}
          done

      - name: Build & Push ai-module
        run: |
          REGISTRIES="$ECR_SEOUL"
          [ "$PUSH_OHIO" = "true" ] && REGISTRIES="$REGISTRIES $ECR_OHIO"
          docker build -t stockops-ai:${{ github.sha }} stockops-ai-module/
          for reg in $REGISTRIES; do
            docker tag stockops-ai:${{ github.sha }} $reg/stockops-ai:${{ github.sha }}
            docker push $reg/stockops-ai:${{ github.sha }}
          done

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      # ── GitOps 레포에 이미지 SHA commit → ArgoCD 가 감지·동기화 ──────────
      - name: Update GitOps manifest (Seoul)
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/jinuuuKim/Stockops-GitOps.git gitops
          cd gitops/apps/stockops/seoul/overlays

          kustomize edit set image \
            $ECR_SEOUL/stockops-api=$ECR_SEOUL/stockops-api:${{ github.sha }} \
            $ECR_SEOUL/stockops-ai=$ECR_SEOUL/stockops-ai:${{ github.sha }}

          cd "$GITHUB_WORKSPACE/gitops"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/stockops/seoul/overlays/kustomization.yaml
          git commit -m "deploy(seoul): ${{ github.sha }}" || echo "no changes to commit"
          git push
      - name: Update GitOps manifest (Ohio)
        if: ${{ env.PUSH_OHIO == 'true' }}
        run: |
          cd "$GITHUB_WORKSPACE/gitops/apps/stockops/ohio/overlays"

          kustomize edit set image \
            $ECR_OHIO/stockops-api=$ECR_OHIO/stockops-api:${{ github.sha }} \
            $ECR_OHIO/stockops-ai=$ECR_OHIO/stockops-ai:${{ github.sha }}

          cd "$GITHUB_WORKSPACE/gitops"
          git add apps/stockops/ohio/overlays/kustomization.yaml
          git commit -m "deploy(ohio): ${{ github.sha }}" || echo "no changes to commit"
          git push

      # ── CloudFront 캐시 무효화 ─────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          CLIENT_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='siseon.live']].Id" \
            --output text)
          ADMIN_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='app.siseon.live']].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id $CLIENT_DIST_ID --paths "/*"
          aws cloudfront create-invalidation --distribution-id $ADMIN_DIST_ID --paths "/*"