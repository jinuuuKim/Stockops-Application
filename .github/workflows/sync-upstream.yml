name: Sync Upstream Submodules

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:        # 수동 즉시 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Sync forks from hansLee-it upstream
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          repos=(sensimul stockops-admin-web stockops-client-web stockops-api-server stockops-ai-module)
          for repo in "${repos[@]}"; do
            echo "==> Syncing jinuuuKim/$repo ..."
            gh repo sync jinuuuKim/$repo --force \
              && echo "    ✓ $repo synced" \
              || echo "    ⚠️ $repo sync failed (skipping)"
          done

      - name: Update submodule pointers to latest
        run: |
          git submodule update --remote --merge

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No upstream changes — nothing to commit."
          else
            git commit -m "chore: sync submodules from hansLee-it upstream"
            git push
          fi
