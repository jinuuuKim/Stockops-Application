name: stockops-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockops-postgres
    environment:
      POSTGRES_DB: stockops
      POSTGRES_USER: stockops
      POSTGRES_PASSWORD: stockops
    ports:
      - "15432:5432"
    volumes:
      - stockops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockops -d stockops"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: stockops-redis
    ports:
      - "16379:6379"
    volumes:
      - stockops_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    container_name: stockops-mqtt
    command:
      - sh
      - -c
      - |
        printf 'listener 1883 0.0.0.0\nallow_anonymous true\n' > /tmp/mosquitto.conf
        mosquitto -c /tmp/mosquitto.conf
    ports:
      - "11883:1883"

  backend:
    build:
      context: ../stockops-api-server
      dockerfile: Dockerfile
    container_name: stockops-api-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      STOCKOPS_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockops
      STOCKOPS_DATASOURCE_USERNAME: stockops
      STOCKOPS_DATASOURCE_PASSWORD: stockops
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: local-dev-jwt-secret-local-dev-jwt-secret-local-dev-jwt-secret
      STOCKOPS_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:18081,http://localhost:18082,http://admindev.ithans.com,https://admindev.ithans.com,http://clientdev.ithans.com,https://clientdev.ithans.com
      STOCKOPS_MQTT_INGESTION_ENABLED: "true"
      STOCKOPS_MQTT_INGESTION_BROKER_URL: tcp://mqtt:1883
      STOCKOPS_SENSIMUL_BASE_URL: http://sensimul-web:8080
      STOCKOPS_ANALYTICS_ENABLED: "true"
      STOCKOPS_AI_ENABLED: "true"
      STOCKOPS_AI_SERVICE_URL: http://ai-module:8000
      STOCKOPS_AUTH_REFRESH_COOKIE_SECURE: "false"
      STOCKOPS_TEST_ACCOUNTS_PASSWORD: ${STOCKOPS_TEST_ACCOUNTS_PASSWORD:-}
      GEMINI_ENABLED: "false"
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
      JAVA_OPTS: -Xms256m -Xmx768m
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  admin-web:
    build:
      context: ../stockops-admin-web
      dockerfile: ../stockops-cloud/local/admin-web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: stockops-admin-web
    depends_on:
      backend:
        condition: service_started
    ports:
      - "18081:80"
    volumes:
      - ./local/admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  sensimul:
    build:
      context: ../sensimul
      dockerfile: Dockerfile
      args:
        APP_NAME: sensimul
        TARGETOS: linux
        TARGETARCH: amd64
    container_name: stockops-sensimul
    depends_on:
      mqtt:
        condition: service_started
    environment:
      SENSIMUL_MQTT_BROKER_URL: tcp://mqtt:1883
      SENSIMUL_SQLITE_PATH: /app/data/sensimul.db
      SENSIMUL_SITE_ID: SEOUL_COLD_CHAIN_01
      SENSIMUL_TICK_INTERVAL: 5s
      SENSIMUL_MODE: dev
      SENSIMUL_LOGGING_FORMAT: console
    volumes:
      - stockops_sensimul_data:/app/data
    command: ["run", "--config", "/app/config/sensimul.yaml"]

  sensimul-web:
    build:
      context: ../sensimul
      dockerfile: Dockerfile
      args:
        APP_NAME: web
        TARGETOS: linux
        TARGETARCH: amd64
    container_name: stockops-sensimul-web
    depends_on:
      mqtt:
        condition: service_started
    environment:
      SENSIMUL_MQTT_BROKER_URL: tcp://mqtt:1883
      SENSIMUL_SQLITE_PATH: /app/data/sensimul-web.db
      SENSIMUL_MODE: dev
      SENSIMUL_WEB_LISTEN_ADDR: :8080
      SENSIMUL_LOGGING_FORMAT: console
    ports:
      - "28080:8080"
    volumes:
      - stockops_sensimul_data:/app/data
    command: ["--config", "/app/config/sensimul.yaml"]

  ai-module:
    build:
      context: ../stockops-ai-module
      dockerfile: Dockerfile
    container_name: stockops-ai-module
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stockops:stockops@postgres:5432/stockops
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: "8000"
      AI_MODULE_API_KEY: ""
    ports:
      - "18000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  client-web:
    build:
      context: ../stockops-client-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: stockops-client-web
    depends_on:
      backend:
        condition: service_started
    ports:
      - "18082:80"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: stockops-mailhog
    ports:
      - "11025:1025"
      - "18025:8025"

volumes:
  stockops_postgres_data:
  stockops_redis_data:
  stockops_sensimul_data:
