<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StockOps Client Web</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 18px 50px rgba(20, 30, 45, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.65;
        color: #4b5565;
      }

      code {
        border-radius: 4px;
        background: #eef2f7;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>StockOps Client Web</h1>
      <p>
        매장/기관용 클라이언트 웹은 아직 구현 전입니다. 로컬 통합 Docker 환경에서는
        <code>stockops-client-web</code> 자리 확인용 placeholder로 실행됩니다.
      </p>
    </main>
  </body>
</html>
